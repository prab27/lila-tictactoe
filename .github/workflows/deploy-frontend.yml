name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm install

      - name: Build
        env:
          REACT_APP_NAKAMA_HOST: ${{ secrets.NAKAMA_HOST }}
          REACT_APP_NAKAMA_PORT: ${{ secrets.NAKAMA_PORT || '443' }}
          REACT_APP_NAKAMA_SSL: ${{ secrets.NAKAMA_SSL || 'true' }}
          REACT_APP_NAKAMA_KEY: ${{ secrets.NAKAMA_KEY || 'defaultkey' }}
          PUBLIC_URL: /lila-tictactoe
        run: cd frontend && npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/build
          cname: ''
